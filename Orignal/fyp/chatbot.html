<body style="background-image:url(background.jpg); background-size:cover;background-repeat:no-repeat; display: flex; flex-direction: column; min-height: 100vh; margin-top:10px;padding:5px;">
    <div id="page-content">
        <div class="container">
            <h1>Generate Questions</h1>
            <h3>Enter the text or URL</h3>
            <form method="POST">
                <textarea name="text_input"
                    placeholder="Enter text or paste a URL..."></textarea>
                <button type="submit">Generate Questions</button>
            </form>

            <div class="questions">
                <!-- {% if questions %} -->
                <h2>Generated Questions:</h2>
                <!-- {% for question in questions %} -->
                <div class="question-block">
                    <!-- <p>{{ question }}</p> -->
                    <div class="button-container">
                        <button onclick="speakText('{{ question }}')">Speak</button>
                        <button onclick="startAnswering('{{ loop.index }}')">Start Answering</button>
                        <button onclick="stopAnswering()">Stop Answering</button>
                    </div>
                    <input type="text" class="answer-input" id="answer-{{ loop.index }}"
                        placeholder="Your answer here..." />
                    <!-- <div class="answer-display" id="display-answer-{{ loop.index }}"></div>
                </div> -->
                <!-- {% endfor %} -->

                <button id="download-btn">Download as PDF</button>
                <button onclick="speakAll()">Speak All</button>
                <!-- {% endif %}
                {% if error_message %} -->
                <div style="color: red; margin-bottom: 20px;">
                    <!-- {{ error_message }} -->
                </div>
                <!-- {% endif %} -->

            </div>
        </div>
    </div>
