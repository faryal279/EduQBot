<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scriptany-Inspired Hero</title>
  <link rel="stylesheet" href="contact.css"/>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="nav-container">
      <div class="logo">
        
        <img src="/icons/owl.webp" alt="">
      </div>
      <nav class="navbar">
        <a href="/index.html" class="active">Home</a>
        <a href="aboutus.html">About Us</a>
        <a href="#">Pages</a>
        <a href="contact.html">Contact Us</a>
      </nav>
      <a href="#" class="demo-btn">Demo</a>
    </div>
  </header>

  <section class="parallax-section">
  <div class="parallax-bg"></div>
  <div class="parallax-overlay-text">
    <h1>Team</h1>
  </div>
</section>



<section class="contact-options">
    <div class="contact-card">
      <div class="icon"><img src="/icons/whatsapp.png" alt="Partnership Icon" /></div>
      <h2>Whatsapp</h2>
      <p>Reach out and we'll explore all opportunities.</p>
      <a href="#" class="talk-btn">Talk To Us</a>
    </div>
  <div class="contact-card">
    <div class="icon"><img src="/icons/instagram.png" alt="Sales Icon" /></div>
    <h2>Instagram</h2>
    <p>Reach out and we'll explore all opportunities.</p>
    <a href="#" class="talk-btn">Talk To Us</a>
  </div>
  <div class="contact-card">
    <div class="icon"><img src="/icons/linkdin.png" alt="Chat Icon" /></div>
    <h2>Linkdin</h2>
    <p>Reach out and we'll explore all opportunities.</p>
    <a href="#" class="talk-btn">Talk To Us</a>
  </div>
</section>



<!-- Form -->


<section class="contact-form-section">
  <div class="form-container">
    <div class="form-left">
      <h4>/Leave A Message</h4>
      <h1>Get In <span>Touch</span> Today</h1>
      <form>
        <div class="input-row">
          <div class="input-group">
            <label>Name</label>
            <input type="text" placeholder="John Carter" />
          </div>
          <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="example@email.com" />
          </div>
        </div>

        <div class="input-row">
          <div class="input-group">
            <label>Phone</label>
            <input type="text" placeholder="(123) 456 - 789" />
          </div>
          <div class="input-group">
            <label>Company</label>
            <input type="text" placeholder="Ex. Facebook" />
          </div>
        </div>

        <div class="input-group full-width">
          <label>Message</label>
          <textarea placeholder="Message"></textarea>
        </div>

        <button class="submit-btn" type="submit">Send Message</button>
      </form>
    </div>

    <div class="form-right">
      <img src="/icons/ai.jpg" alt="AI Contact Image" />
    </div>
  </div>
</section>




 <script>
    const section = document.querySelector('.parallax-section');
    const bg = section.querySelector('.parallax-bg');

    section.addEventListener('mousemove', (e) => {
      const rect = section.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width - 0.5) * -30;
      const y = ((e.clientY - rect.top) / rect.height - 0.5) * -30;
      bg.style.transform = `translate(${x}px, ${y}px)`;
    });
  </script>

  
</body>
</html>
