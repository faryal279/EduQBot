  <!-- Parallax JS -->
  <script>
    const section = document.querySelector('.parallax-section');
    const bg = section.querySelector('.parallax-bg');

    section.addEventListener('mousemove', (e) => {
      const rect = section.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width - 0.5) * -30;
      const y = ((e.clientY - rect.top) / rect.height - 0.5) * -30;
      bg.style.transform = `translate(${x}px, ${y}px)`;
    });


    // Faq section list
    
    
     document.querySelectorAll('.faq-question').forEach(btn => {
    btn.addEventListener('click', () => {
      const answer = btn.nextElementSibling;
      const isVisible = answer.classList.contains('show');

      // Close all
      document.querySelectorAll('.faq-answer').forEach(ans => {
        ans.classList.remove('show');
        ans.previousElementSibling.classList.remove('active');
      });

      // Open clicked
      if (!isVisible) {
        answer.classList.add('show');
        btn.classList.add('active');
      }
    });
  });

  document.getElementById('generateBtn').addEventListener('click', () => {
  const input = document.getElementById('userInput').value.trim();
  const outputBox = document.getElementById('questionsContainer');
  const loading = document.getElementById('loadingIndicator');
  const error = document.getElementById('errorMessage');
  const downloadBtn = document.getElementById('downloadBtn');

  outputBox.innerHTML = '';
  error.style.display = 'none';
  loading.style.display = 'block';
  downloadBtn.disabled = true;

  fetch('./chat_api.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: input })
  })
  .then(res => res.json())
  .then(data => {
    loading.style.display = 'none';

    if (data.error) {
      error.textContent = data.error;
      error.style.display = 'block';
      return;
    }

    if (data.response) {
      try {
        const questions = JSON.parse(data.response);
        
        if (questions && questions.Questions && Array.isArray(questions.Questions)) {
          outputBox.innerHTML = '';
          questions.Questions.forEach((q, i) => {
            // Extract the question text from the object
            const questionText = (typeof q === 'object' && q !== null && q.question) ? q.question : (typeof q === 'string' ? q : JSON.stringify(q));

            outputBox.innerHTML += `
              <div class="question-item">
                <div class="question-number">${i + 1}</div>
                <div class="question-content">
                  <div class="question-type">Question</div>
                  <div class="question-text">${questionText}</div>
                </div>
              </div>
            `;
          });

          // Save to database
          fetch('save_question.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              input_text: input,
              questions: data.response
            })
          })
          .catch(err => console.error('Failed to save history:', err));

          downloadBtn.disabled = false;
          downloadBtn.onclick = () => {
            const blob = new Blob([JSON.stringify(questions, null, 2)], { type: "application/json" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "questions.json";
            link.click();
          };
        } else {
          outputBox.innerHTML = `<div class="question-text">${data.response}</div>`;
        }
      } catch (e) {
        outputBox.innerHTML = `<div class="question-text">${data.response}</div>`;
      }
    } else {
      outputBox.innerHTML = '<p class="placeholder-text">No questions generated.</p>';
    }
  })
  .catch(err => {
    loading.style.display = 'none';
    error.textContent = 'Error contacting server.';
    error.style.display = 'block';
  });
});
  </script>

  <!-- Voice Input Implementation -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const voiceInputBtn = document.getElementById('voiceInputBtn');
      const userInput = document.getElementById('userInput');
      const interimText = document.getElementById('interimText');
      let recognition = null;
      let isRecording = false;
      let finalTranscript = '';

      // Check browser support
      if (!SpeechRecognition) {
        console.log("Speech Recognition not supported");
        voiceInputBtn.style.display = 'none';
        return;
      }

      // Request microphone permission
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
          // Stop the stream immediately - we just needed permission
          stream.getTracks().forEach(track => track.stop());
          setupSpeechRecognition();
        })
        .catch(err => {
          console.error('Microphone permission denied:', err);
          voiceInputBtn.style.display = 'none';
        });

      function setupSpeechRecognition() {
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.continuous = true;
        recognition.interimResults = true;

        voiceInputBtn.addEventListener('click', toggleRecording);

        recognition.onstart = () => {
          isRecording = true;
          voiceInputBtn.classList.add('recording');
          voiceInputBtn.querySelector('img').src = '../icons/mic-active.svg';
          interimText.textContent = 'Listening...';
          console.log('Recording started');
        };

        recognition.onend = () => {
          isRecording = false;
          voiceInputBtn.classList.remove('recording');
          voiceInputBtn.querySelector('img').src = '../icons/mic.svg';
          interimText.textContent = '';
          console.log('Recording ended');
        };

        recognition.onresult = (event) => {
          let interimTranscript = '';
          
          // Process all results
          for (let i = event.resultIndex; i < event.results.length; i++) {
            const transcript = event.results[i][0].transcript;
            
            if (event.results[i].isFinal) {
              finalTranscript += transcript + ' ';
              // Update the input field with all final transcripts
              userInput.value = finalTranscript.trim();
              interimText.textContent = '';
            } else {
              interimTranscript = transcript;
              // Show interim results in the interim text div
              interimText.textContent = interimTranscript;
            }
          }
        };

        recognition.onerror = (event) => {
          console.error('Speech recognition error:', event.error);
          if (event.error === 'not-allowed') {
            alert('Microphone access is required for voice input.');
            voiceInputBtn.style.display = 'none';
          }
          isRecording = false;
          voiceInputBtn.classList.remove('recording');
          voiceInputBtn.querySelector('img').src = '../icons/mic.svg';
          interimText.textContent = '';
        };
      }

      function toggleRecording() {
        if (!recognition) return;

        if (!isRecording) {
          try {
            finalTranscript = userInput.value ? userInput.value + ' ' : ''; // Keep existing text
            recognition.start();
          } catch (err) {
            console.error('Error starting recognition:', err);
          }
        } else {
          try {
            recognition.stop();
          } catch (err) {
            console.error('Error stopping recognition:', err);
          }
        }
      }
    });
  </script>

  <!-- File Import Implementation -->
  <script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      // Check if it's a text file
      if (file.type !== 'text/plain') {
        alert('Please select a text (.txt) file');
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        const content = e.target.result;
        document.getElementById('userInput').value = content;
        
        // Optional: Automatically generate questions after file is loaded
        const generateBtn = document.getElementById('generateBtn');
        const shouldGenerate = confirm('Would you like to generate questions from this file?');
        if (shouldGenerate) {
          generateBtn.click();
        }
      };
      reader.onerror = function(e) {
        alert('Error reading file: ' + e.target.error);
      };
      reader.readAsText(file);
    });
  </script>
