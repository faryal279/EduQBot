<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="chatbot.css">
  <style>
    .user-info {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .username {
      color: #a855f7;
      font-weight: 600;
      font-size: 18px;
    }
    .logout-btn {
      background-color: #ff4444;
    }
    .logout-btn:hover {
      background-color: #cc3333;
    }
    .auth-buttons {
      display: none;
    }
    .auth-buttons.show {
      display: flex;
      gap: 20px;
    }
    .login-btn {
      background-color: #a855f7;
    }
    .login-btn:hover {
      background-color: #9333ea;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="nav-container">
      <div class="logo">
        <img src="../icons/owl.webp" alt="">
      </div>
      <nav class="navbar">
        <a href="../index.html">Home</a>
        <a href="../pages/aboutus.html">About Us</a>
        <a href="../pages/faq.html">FAQ</a>
        <a href="../pages/contact.html">Contact Us</a>
      </nav>
      <div class="user-info" style="display: none;">
        <span id="userFirstName" class="username">Welcome, </span>
        <a href="logout.php" class="demo-btn logout-btn">Logout</a>
      </div>
      <div class="auth-buttons">
        <a href="login.php" class="demo-btn login-btn">Login</a>
        <a href="signup.html" class="demo-btn">Sign Up</a>
      </div>
    </div>
  </header>

  
  <!-- Parallax Background Section -->
<section class="parallax-section">
  <div class="parallax-bg"></div>
  <div class="parallax-overlay-text">
    <h1>ChatBot</h1>
  </div>
</section>


<!-- Question Generator Section -->
<section class="generator-section">
  <div class="generator-header">
    <h2>AI Question Generator</h2>
    <a href="../pages/history.html" class="history-btn">History</a>
  </div>

  <div class="generator-container">
    <textarea id="inputText" placeholder="Enter your text here..."></textarea>
    
    <div class="action-buttons">
      <button id="generateBtn">Generate Questions</button>
      <button id="downloadBtn">Download Response</button>
    </div>

    <div id="outputContainer" class="output-box">
      <p class="placeholder-text">Generated questions will appear here...</p>
    </div>
  </div>
</section>






 

  <!-- Parallax JS -->
  <script>
    const section = document.querySelector('.parallax-section');
    const bg = section.querySelector('.parallax-bg');

    section.addEventListener('mousemove', (e) => {
      const rect = section.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width - 0.5) * -30;
      const y = ((e.clientY - rect.top) / rect.height - 0.5) * -30;
      bg.style.transform = `translate(${x}px, ${y}px)`;
    });


    // Faq section list
    
    
     document.querySelectorAll('.faq-question').forEach(btn => {
    btn.addEventListener('click', () => {
      const answer = btn.nextElementSibling;
      const isVisible = answer.classList.contains('show');

      // Close all
      document.querySelectorAll('.faq-answer').forEach(ans => {
        ans.classList.remove('show');
        ans.previousElementSibling.classList.remove('active');
      });

      // Open clicked
      if (!isVisible) {
        answer.classList.add('show');
        btn.classList.add('active');
      }
    });
  });

  </script>
  <script src="../js/header.js"></script>
</body>
</html>
