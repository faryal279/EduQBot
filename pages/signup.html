<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Up | Question Generator</title>
  <link rel="stylesheet" href="signup.css" />
</head>
<body>
  <section class="parallax-section">
    <div class="parallax-bg"></div>
    <div class="form-wrapper">
      <form class="form-box" action="signup.php" method="POST">
        <h2><img src="../icons/owl.webp" alt="Logo" /></h2>
        <h2>Create your account</h2>

        <div class="name-row">
          <div class="input-box">
            <input type="text" id="firstName" name="firstName" required />
            <label for="firstName">First Name</label>
          </div>
          <div class="input-box">
            <input type="text" id="lastName" name="lastName" required />
            <label for="lastName">Last Name</label>
          </div>
        </div>

        <div class="input-box">
          <input type="email" id="email" name="email" required />
          <label for="email">Email Address</label>
        </div>

        <div class="input-box">
          <input type="password" id="password" name="password" required />
          <label for="password">Password</label>
        </div>

        <div class="input-box">
          <input type="password" id="confirmPassword" name="confirmPassword" required />
          <label for="confirmPassword">Confirm Password</label>
        </div>

        <button type="submit">Sign Up</button>

        <a href="login.html" class="login-link">Already have an account? <span style="color: burlywood;">Login</span> </a>
      </form>
    </div>
  </section>

  <script>
    const section = document.querySelector('.parallax-section');
    const bg = section.querySelector('.parallax-bg');

    section.addEventListener('mousemove', (e) => {
      const rect = section.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width - 0.5) * -30;
      const y = ((e.clientY - rect.top) / rect.height - 0.5) * -30;
      bg.style.transform = `translate(${x}px, ${y}px)`;
    });
  </script>
</body>
</html>
